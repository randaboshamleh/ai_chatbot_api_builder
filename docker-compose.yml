services:
  # ───────────────────────────────
  # Django API
  # ───────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 4 --timeout 180 --worker-class gthread
    volumes:
      - .:/app
      - media_data:/app/media
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz/', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
      ollama:
        condition: service_started
    networks:
      - internal

  # ───────────────────────────────
  # Celery Worker
  # ───────────────────────────────
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A workers.celery worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - media_data:/app/media
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ───────────────────────────────
  # Celery Beat (Scheduled Tasks)
  # ───────────────────────────────
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A workers.celery beat --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  # ───────────────────────────────
  # PostgreSQL
  # ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-ai_db}
      POSTGRES_USER: ${DB_USER:-ai_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ai_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ai_user} -d ${DB_NAME:-ai_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - internal

  # ───────────────────────────────
  # Redis
  # ───────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis_pass} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - internal

  # ───────────────────────────────
  # ChromaDB (Vector Database)
  # ───────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.23
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    networks:
      - internal

  # ───────────────────────────────
  # Ollama (LLM Engine - On-Premise)
  # ───────────────────────────────
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal

  # ───────────────────────────────
  # MinIO (Object Storage)
  # ───────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    networks:
      - internal

  # ───────────────────────────────
  # Nginx (Reverse Proxy)
  # ───────────────────────────────
  nginx:
    image: nginx:alpine
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./static:/static
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  ollama_data:
  minio_data:
  media_data:


networks:
  internal:
    driver: bridge
