name: CI/CD Pipeline - Assistify

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  # ═══════════════════════════════════════════════════════════════
  # 🔒 STAGE 1: Security Scanning (GitLeaks)
  # ═══════════════════════════════════════════════════════════════
  gitleaks:
    name: 🔒 Secret Scanning (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ═══════════════════════════════════════════════════════════════
  # 🧪 STAGE 2: Unit Tests (Backend)
  # ═══════════════════════════════════════════════════════════════
  unit-tests:
    name: 🧪 Unit Tests (Django)
    runs-on: ubuntu-latest
    needs: gitleaks

    env:
      DJANGO_SETTINGS_MODULE: ci_settings
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-django pytest-cov

      - name: Verify test tooling
        run: |
          python --version
          python -m pytest --version

      - name: Run Unit Tests with Coverage
        run: |
          python -m pytest apps/tests/test_unit.py -v --cov=apps --cov=core --cov-report=term --cov-report=html
          echo "✅ Unit tests passed"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  # ═══════════════════════════════════════════════════════════════
  # 🔗 STAGE 3: Integration Tests
  # ═══════════════════════════════════════════════════════════════
  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    env:
      DJANGO_SETTINGS_MODULE: ci_settings
      SECRET_KEY: ci-test-secret-key
      DEBUG: "True"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-django

      - name: Run migrations
        run: |
          python manage.py migrate --settings=ci_settings

      - name: Run Integration Tests
        run: |
          python -m pytest apps/tests/test_integration.py -v
          echo "✅ Integration tests passed"

  # ═══════════════════════════════════════════════════════════════
  # ⚡ STAGE 4: Performance Tests
  # ═══════════════════════════════════════════════════════════════
  performance-tests:
    name: ⚡ Performance Tests (Locust)
    runs-on: ubuntu-latest
    needs: integration-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Locust
        run: |
          pip install locust

      - name: Placeholder - Performance Test
        run: |
          echo "⚡ Performance tests would run against deployed environment"
          echo "Locust test file: tests/performance/locustfile.py"
          echo "✅ Performance test stage complete"

  # ═══════════════════════════════════════════════════════════════
  # 🎭 STAGE 5: E2E Tests (Playwright)
  # ═══════════════════════════════════════════════════════════════
  e2e-tests:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: integration-tests
    env:
      NODE_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Backend Migrations
        run: |
          python manage.py migrate --settings=ci_settings

      - name: Start Django Backend
        run: |
          python manage.py runserver 127.0.0.1:8000 --settings=ci_settings &
          sleep 8

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci --include=dev

      - name: Verify Playwright Dependencies
        working-directory: frontend
        run: npm ls @playwright/test playwright

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          CI: true
          VITE_API_PROXY_TARGET: http://127.0.0.1:8000

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # 🏗️ STAGE 6: Build & Deploy (Placeholder)
  # ═══════════════════════════════════════════════════════════════
  build-deploy:
    name: 🏗️ Build & Deploy
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          echo "🐳 Building Docker images..."
          docker compose build
          echo "✅ Docker images built successfully"

      - name: Placeholder - Deploy to Staging
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "This would push images to registry and deploy to staging"
          echo "✅ Deployment complete"

  # ═══════════════════════════════════════════════════════════════
  # 📊 STAGE 7: Code Quality & Security
  # ═══════════════════════════════════════════════════════════════
  code-quality:
    name: 📊 Code Quality & Security
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install security tools
        run: |
          pip install bandit safety

      - name: Run Bandit (Security Linter)
        run: |
          bandit -r apps/ core/ config/ -ll --exclude apps/tests/ || true
          echo "✅ Security scan complete"

      - name: Check dependency vulnerabilities
        run: |
          safety check --json || true
          echo "✅ Dependency check complete"
